services:
  # Backend Service
  - type: web
    name: sys-design-sim-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 8080
      - key: GROK_API_KEY
        sync: false
      - key: XAI_ENDPOINT
        value: https://api.groq.com/openai/v1/chat/completions

  # Frontend Service
  - type: web
    name: sys-design-sim-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: VITE_API_URL
        value: https://sys-design-sim-backend.onrender.com # Placeholder: Update this after backend is live
