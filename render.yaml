services:
  # Backend Service
  - type: web
    name: sys-design-sim-backend
    env: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    region: singapore # Change to your preferred region
    envVars:
      - key: PORT
        value: 8080
      - key: GROK_API_KEY
        sync: false # Set this in Render Dashboard
      - key: XAI_ENDPOINT
        value: https://api.groq.com/openai/v1/chat/completions

  # Frontend Service
  - type: web
    name: sys-design-sim-frontend
    env: docker
    dockerContext: frontend
    dockerfilePath: frontend/Dockerfile
    plan: free
    region: singapore # Change to your preferred region
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: sys-design-sim-backend
          property: host
